<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZoomSense</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- HEADER ---------------------------------------------------------------- -->
  <header class="header">
    <div class="brand">
      <div class="clay-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="1.5" y="2" width="9" height="7" rx="1.5" stroke="currentColor" stroke-width="1.7"/>
          <line x1="6" y1="9" x2="6" y2="12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <line x1="3.5" y1="12" x2="8.5" y2="12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <rect x="9.5" y="7" width="9" height="10" rx="1.5" stroke="var(--blue)" stroke-width="1.7"/>
          <line x1="13" y1="17" x2="13" y2="19" stroke="var(--blue)" stroke-width="1.7" stroke-linecap="round"/>
          <line x1="10.5" y1="19" x2="15.5" y2="19" stroke="var(--blue)" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">ZoomSense</div>
        <div class="brand-sub">Auto zoom by display</div>
      </div>
    </div>
    <label class="toggle-label">
      <input type="checkbox" id="enabledToggle">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
    </label>
  </header>

  <!-- STATUS ---------------------------------------------------------------- -->
  <div class="status-bar" id="statusBar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Detecting…</span>
  </div>

  <!-- DISPLAY CARDS --------------------------------------------------------- -->
  <div class="cards-row">
    <div class="dcard" id="laptopCard">
      <div class="dcard-icon">
        <svg width="26" height="20" viewBox="0 0 26 20" fill="none">
          <rect x="2" y="1" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.7"/>
          <line x1="11" y1="13" x2="11" y2="16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <line x1="7" y1="16" x2="15" y2="16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="dcard-name">Laptop</div>
      <div class="dcard-zoom" id="laptopCardZoom">1.00×</div>
    </div>

    <div class="cards-arrow">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="none">
        <path d="M2 6h14M11 2l5 4-5 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="dcard dcard-ext" id="externalCard">
      <div class="dcard-icon">
        <svg width="30" height="22" viewBox="0 0 30 22" fill="none">
          <rect x="1" y="1" width="28" height="16" rx="2" stroke="currentColor" stroke-width="1.7"/>
          <line x1="10" y1="17" x2="10" y2="20" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <line x1="20" y1="17" x2="20" y2="20" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <line x1="6" y1="20" x2="24" y2="20" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="dcard-name" id="externalCardName">External</div>
      <div class="dcard-zoom" id="externalCardZoom">1.50×</div>
    </div>
  </div>

  <!-- ZOOM CONTROLS --------------------------------------------------------- -->
  <div class="clay-card">
    <div class="zoom-row">
      <span class="zoom-row-label">
        <svg width="14" height="11" viewBox="0 0 14 11" fill="none">
          <rect x="1" y="1" width="9" height="7" rx="1" stroke="currentColor" stroke-width="1.4"/>
          <line x1="5.5" y1="8" x2="5.5" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="3" y1="10" x2="8" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Laptop
      </span>
      <div class="stepper">
        <button class="step-btn" id="laptopMinus">−</button>
        <span class="step-val" id="laptopVal">1.00×</span>
        <button class="step-btn" id="laptopPlus">+</button>
      </div>
    </div>

    <div class="zoom-sep"></div>

    <div class="zoom-row">
      <span class="zoom-row-label ext-label">
        <svg width="14" height="11" viewBox="0 0 14 11" fill="none">
          <rect x="1" y="1" width="12" height="8" rx="1" stroke="var(--blue)" stroke-width="1.4"/>
          <line x1="4.5" y1="9" x2="4.5" y2="11" stroke="var(--blue)" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="9.5" y1="9" x2="9.5" y2="11" stroke="var(--blue)" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="2" y1="11" x2="12" y2="11" stroke="var(--blue)" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        External
      </span>
      <div class="stepper">
        <button class="step-btn ext" id="externalMinus">−</button>
        <span class="step-val ext" id="externalVal">1.50×</span>
        <button class="step-btn ext" id="externalPlus">+</button>
      </div>
    </div>
  </div>

  <!-- PRESETS --------------------------------------------------------------- -->
  <div class="presets-header">
    <span class="presets-title">Quick preset</span>
    <span class="presets-hint">→ external</span>
  </div>
  <div class="presets" id="presets">
    <button class="pbtn" data-zoom="0.75">75%</button>
    <button class="pbtn" data-zoom="1.0">100%</button>
    <button class="pbtn" data-zoom="1.25">125%</button>
    <button class="pbtn" data-zoom="1.5">150%</button>
    <button class="pbtn" data-zoom="1.75">175%</button>
    <button class="pbtn" data-zoom="2.0">200%</button>
  </div>

  <!-- PRIMARY ACTION -------------------------------------------------------- -->
  <button class="apply-btn" id="applyBtn">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.6"/>
      <path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M6 3.5v5M3.5 6h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    SET MONITOR ZOOM
  </button>

  <!-- FOOTER ---------------------------------------------------------------- -->
  <div class="footer">
    <button class="foot-btn" id="settingsBtn">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <circle cx="6.5" cy="6.5" r="2" stroke="currentColor" stroke-width="1.4"/>
        <path d="M6.5 1v1.2M6.5 10.8V12M1 6.5h1.2M10.8 6.5H12M2.9 2.9l.85.85M9.25 9.25l.85.85M9.25 3.75l-.85.85M3.75 9.25l-.85.85" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Full Settings
    </button>
    <div class="foot-sep"></div>
    <button class="foot-btn" id="diagBtn">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <rect x="1" y="1" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/>
        <path d="M3.5 8.5L5.5 6l1.5 2 2.5-4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Diagnose
    </button>
  </div>

  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
